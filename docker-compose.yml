services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stoku-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stoku-queue
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stoku-scheduler
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: php artisan schedule:work
    volumes:
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    container_name: stoku-frontend
    restart: unless-stopped
    ports:
      - "4173:4173"

  postgres:
    image: postgres:16-alpine
    container_name: stoku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stoku
      POSTGRES_USER: stoku
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoku -d stoku"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stoku-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backup:
    image: postgres:16-alpine
    container_name: stoku-backup
    profiles: ["backup"]
    environment:
      PGPASSWORD: change-me
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: "pg_dump -h postgres -U stoku -d stoku -Fc > /backups/stoku-$$(date +%Y%m%d-%H%M%S).dump"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  backend_storage:
